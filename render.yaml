# render.yaml — SICODI Backend PHP (solo API)
# El frontend Next.js se despliega en Vercel por separado.

services:
  - type: web
    name: sicodi-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/v1/health
    envVars:
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "4000"
      - key: DB_NAME
        value: sigdi
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
      - key: DB_SSL
        value: "true"
      - key: APP_URL
        sync: false
      - key: FRONTEND_URL
        sync: false
