# railway.toml — Backend PHP (SICODI API)
# Este archivo controla el despliegue del backend PHP en Railway.
# Para el frontend, usa el archivo frontend/railway.toml

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "/docker-entrypoint.sh"
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 30
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
