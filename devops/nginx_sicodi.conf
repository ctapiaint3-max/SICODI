server {
    listen 80;
    server_name sicodi.intranet.gov;
    
    # Redirección HTTP a HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    server_name sicodi.intranet.gov;

    # Certificados Institucionales SSL CA
    ssl_certificate /etc/nginx/ssl/sicodi_cert.pem;
    ssl_certificate_key /etc/nginx/ssl/sicodi_key.pem;
    
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    
    # Restricción de ataques y headers de seguridad (Owasp)
    add_header X-Frame-Options DENY;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection "1; mode=block";

    # Proxy hacia el Frontend (Next.js)
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Proxy hacia el Backend (XAMPP Apache)
    location /api/ {
        proxy_pass http://127.0.0.1:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
