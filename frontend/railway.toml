# railway.toml — Frontend Next.js (SICODI Web)
# Coloca este archivo en el directorio raíz del servicio frontend en Railway.

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/login"
healthcheckTimeout = 60
restartPolicyType = "on_failure"
restartPolicyMaxRetries = 3
