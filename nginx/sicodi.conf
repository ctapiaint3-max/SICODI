# SICODI - Nginx Reverse Proxy Configuration
# Ubicación típica: /etc/nginx/sites-available/sicodi.conf (Linux) 
# o c:\nginx\conf\nginx.conf (Windows)

server {
    listen 80;
    server_name sicodi.intranet.gov;

    # Redirección obligatoria HTTP -> HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name sicodi.intranet.gov;

    # SSL Certificados (Generados por Autoridad de Certificación Institucional)
    ssl_certificate /nginx/ssl/sicodi.intranet.gov.crt;
    ssl_certificate_key /nginx/ssl/sicodi.intranet.gov.key;

    # Tuning SSL Institucional (Alta Seguridad)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # Next.js Frontend (Puerto 3000)
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Seguridad XSS / Frame Options
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-XSS-Protection "1; mode=block";
    }

    # PHP Backend API (Apache/XAMPP en Puerto 8000)
    location /api/ {
        proxy_pass http://localhost:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_addrs;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Aumentar límites para subida de Documentos al Repositorio NAS
        client_max_body_size 100M;
    }
}
